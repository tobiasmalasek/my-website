<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Ruleta mimoňů</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎡 Ruleta mimoňů</h1>

<div class="credit">
Banány: <span id="banany"></span>
</div>

<input type="number" id="bet" placeholder="Kolik vsadíš?">

<div class="wheel-container">

<div class="pointer">▼</div>

<div id="wheel" class="wheel">
<div class="segment win">2x</div>
<div class="segment lose">0</div>
<div class="segment win">3x</div>
<div class="segment lose">0</div>
<div class="segment win">5x</div>
<div class="segment lose">0</div>
</div>

</div>

<button class="btn spin" onclick="spinWheel()">TOČIT</button>

<div id="result"></div>

<br>

<button class="btn" onclick="window.location.href='index.html'">
⬅ Hlavní menu
</button>

</div>

<script src="script.js"></script>

</body>
</html>
